<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — CampusSecure</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
<div class="auth-wrap" style="background:radial-gradient(ellipse at 30% 40%,rgba(168,85,247,.1) 0%,transparent 55%),var(--bg)">
  <div class="auth-card admin-auth-card">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">⚠️ {{ message }}</div>
      {% endfor %}
    {% endwith %}
    <div class="auth-badge admin-badge">🛡️ Admin Portal</div>
    <h2>Admin Access</h2>
    <p class="subtitle">Restricted to system administrators</p>
    <form method="POST" action="{{ url_for('auth.admin_login') }}" novalidate>
      <div class="form-group">
        <label for="username">Admin Username</label>
        <input type="text" id="username" name="username" placeholder="Admin username" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Admin password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-admin">
        <span class="btn-text">🛡️ Sign In as Admin</span><span class="spinner"></span>
      </button>
    </form>
    <p class="auth-link"><a href="{{ url_for('auth.index') }}">← Back to home</a></p>
  </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
